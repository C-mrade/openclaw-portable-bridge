name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache: false
      - run: go test ./...
      - run: go test -race ./...
      - run: go vet ./...

  cross-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: windows, arch: amd64, suffix: .exe }
          - { os: windows, arch: arm64, suffix: .exe }
          - { os: linux, arch: amd64, suffix: '' }
          - { os: linux, arch: arm64, suffix: '' }
          - { os: darwin, arch: amd64, suffix: '' }
          - { os: darwin, arch: arm64, suffix: '' }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache: false
      - run: CGO_ENABLED=0 GOOS=${{ matrix.target.os }} GOARCH=${{ matrix.target.arch }} go build -o '/tmp/bridge-client${{ matrix.target.suffix }}' ./cmd/bridge-client
      - run: CGO_ENABLED=0 GOOS=${{ matrix.target.os }} GOARCH=${{ matrix.target.arch }} go build -o '/tmp/OPENCLAW BRIDGE${{ matrix.target.suffix }}' ./cmd/usb-launcher

  windows-runtime:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache: false
      - run: go test ./internal/executor
      - run: go build ./cmd/bridge-client

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
